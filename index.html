<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Agent</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:700px;
    text-align:center;
}

h1{
    margin-bottom:50px;
    color:blueviolet;
}

.search-box{
    display:flex;
    gap:20px;
}

input{
    flex:1;
    height:50px;
    font-size:16px;
    padding-left:15px;
    border:2px solid blueviolet;
    border-radius:25px;
}

button{
    width:140px;
    border:none;
    border-radius:25px;
    background:blueviolet;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:purple;
}

#loading{
    margin-top:30px;
    color:blue;
    font-size:18px;
}

#answer{
    margin-top:30px;
    text-align:left;
    white-space:pre-wrap;
    line-height:1.6;
    font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>HI I AM YOUR AI AGENT!</h1>

<div class="search-box">

<input
id="question"
type="text"
placeholder="Ask your question..."
>

<button id="askBtn">
ASK
</button>

</div>

<div id="loading"></div>

<div id="answer"></div>

</div>

<script>

const button=document.getElementById("askBtn");

const input=document.getElementById("question");

const loading=document.getElementById("loading");

const answer=document.getElementById("answer");

button.addEventListener("click",askQuestion);

input.addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        askQuestion();

    }

});

async function askQuestion(){

    const question=input.value.trim();

    if(question===""){

        alert("Please enter a question.");

        return;

    }

    loading.innerText="Thinking...";

    answer.innerText="";

    try{

        const response=await fetch("/ask",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                question:question

            })

        });

        const data=await response.json();

        loading.innerText="";

        answer.innerText=data.answer;

    }

    catch(error){

        loading.innerText="";

        answer.innerText="Unable to connect to server.";

        console.log(error);

    }

}

</script>

</body>

</html>
